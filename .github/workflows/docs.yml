name: Documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Generate aggregate JavaDoc
        run: mvn -B -DskipTests package javadoc:aggregate

      - name: Start documentation infrastructure
        run: docker compose up -d --wait

      - name: Generate OpenAPI specification
        run: mvn -B -pl ecommerce-app -am -Pgenerate-openapi -DskipTests verify

      - name: Stop documentation infrastructure
        if: always()
        run: docker compose down -v

      - name: Assemble Pages source
        run: |
          mkdir -p pages/docs pages/openapi pages/javadoc
          cp README.md pages/index.md
          cp -R docs/. pages/docs/
          cp ecommerce-app/target/generated-docs/openapi.json pages/openapi/openapi.json
          cp -R target/reports/apidocs/. pages/javadoc/
          cat > pages/_config.yml <<'EOF'
          title: Modular Monolith E-commerce
          markdown: kramdown
          EOF

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./pages
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    name: Deploy Documentation
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
