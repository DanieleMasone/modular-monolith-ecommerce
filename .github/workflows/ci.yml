name: CI and Pages

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Maven Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check Docker
        run: |
          docker version
          docker compose version

      - name: Verify project
        run: mvn -B clean verify

      - name: Generate HTML test reports
        if: always()
        run: mvn -B surefire-report:report-only surefire-report:failsafe-report-only

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-reports
          path: |
            coverage-report/target/site/jacoco-aggregate/**
            shared-kernel/target/reports/surefire.html
            catalog/target/reports/surefire.html
            orders/target/reports/surefire.html
            payment/target/reports/surefire.html
            ecommerce-app/target/reports/surefire.html
            ecommerce-app/target/reports/failsafe.html
          if-no-files-found: error

  build-pages:
    name: Build GitHub Pages
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Download quality reports
        uses: actions/download-artifact@v8
        with:
          name: quality-reports
          path: quality-reports

      - name: Check Docker Compose
        run: docker compose version

      - name: Start Docker Compose for OpenAPI
        run: docker compose up -d --wait

      - name: Generate OpenAPI specification
        run: mvn -B -pl ecommerce-app -am -Pgenerate-openapi -DskipTests verify

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v

      - name: Generate aggregate JavaDoc
        run: mvn -B -DskipTests package javadoc:aggregate

      - name: Assemble Pages artifact source
        run: bash scripts/build-pages.sh

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./pages
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-pages
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
